<div class="page-container">
  <section id="hero" class="hero-section">
    <div class="hero-avatar">
      <img src="profile/avatar.webp" alt="Avatar de Robin" width="450" height="450" loading="eager" />
    </div>
    <div class="hero-content">
      <h1 class="hero-title">Hola, soy Robin</h1>
      <p class="hero-main-profession">Desarrollador de Software</p>
      <p class="hero-secondary-profession">
        Java, Spring Boot y SQL/NoSQL | Linux e Infraestructura
      </p>
      <div class="hero-actions">
        <a routerLink="/projects" class="btn-hero btn-hero-primary">
          <span>Ver Proyectos</span>
          <fa-icon [icon]="faArrowRight"></fa-icon>
        </a>
        <a routerLink="/contact" class="btn-hero btn-hero-secondary">
          <fa-icon [icon]="faComment"></fa-icon>
          <span>Contáctame</span>
        </a>
      </div>
    </div>
  </section>
</div>
